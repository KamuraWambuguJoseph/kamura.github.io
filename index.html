<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wallet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 My Wallet</h1>
            <p class="subtitle">Manage your finances easily</p>
        </header>

        <div class="wallet-section">
            <div class="balance-card">
                <h2>Current Balance</h2>
                <div class="balance-amount" id="balanceAmount">$0.00</div>
                <div class="balance-stats">
                    <div class="stat">
                        <span class="label">Total Income</span>
                        <span class="value income" id="totalIncome">$0.00</span>
                    </div>
                    <div class="stat">
                        <span class="label">Total Expenses</span>
                        <span class="value expense" id="totalExpense">$0.00</span>
                    </div>
                </div>
            </div>

            <div class="form-card">
                <h3>Add Transaction</h3>
                <form id="transactionForm">
                    <div class="form-group">
                        <label for="amount">Amount</label>
                        <input type="number" id="amount" placeholder="0.00" step="0.01" required>
                    </div>

                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="">Select a category</option>
                            <option value="Income">💵 Income</option>
                            <option value="Food">🍔 Food & Dining</option>
                            <option value="Transport">🚗 Transport</option>
                            <option value="Entertainment">🎬 Entertainment</option>
                            <option value="Shopping">🛍️ Shopping</option>
                            <option value="Bills">📄 Bills & Utilities</option>
                            <option value="Health">🏥 Health</option>
                            <option value="Other">📌 Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" required>
                    </div>

                    <div class="form-group">
                        <label for="description">Description</label>
                        <input type="text" id="description" placeholder="Enter description" required>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn btn-add" id="submitButton">Add Transaction</button>
                        <button type="button" class="btn btn-cancel hidden" id="cancelEditBtn" onclick="wallet.cancelEdit()">Cancel Edit</button>
                        <button type="button" class="btn btn-reset" onclick="clearAllData()">Clear All</button>
                    </div>
                    <div class="import-row">
                        <button type="button" class="btn btn-import" onclick="document.getElementById('importFile').click()">Import Mpesa CSV</button>
                        <input type="file" id="importFile" accept=".csv" hidden onchange="wallet.importMpesaCsv(event)">
                    </div>
                </form>
            </div>
        </div>

        <div class="transactions-section">
            <h3>Transaction History</h3>
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterTransactions('all', event)">All</button>
                <button class="filter-btn" onclick="filterTransactions('Income', event)">Income</button>
                <button class="filter-btn" onclick="filterTransactions('Expense', event)">Expenses</button>
            </div>
            <div id="transactionsList" class="transactions-list">
                <p class="empty-message">No transactions yet. Add one to get started!</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
